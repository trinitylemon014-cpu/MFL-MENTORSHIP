# Fly.io app configuration
# NOTE: after running `fly launch`, Fly will generate/overwrite parts of this file.
# Make sure the sections below (mounts + http_service) match this once launch is done.

app = "empower-mentorship"   # fly launch will let you rename this
primary_region = "iad"       # change to the region you picked during fly launch

[build]

[env]
  PORT = "8080"

[mounts]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512